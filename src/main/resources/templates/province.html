<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head th:replace="~{fragments/head :: head ('Ticket Logger - Lista de Provincias')}"></head>
<body>
<header th:replace="~{fragments/header :: header}"></header>

<main class="container mt-5">
    <h1>Lista de Provincias</h1>

    <div th:if="${errorMessage}" class="alert alert-danger">
        <p th:text="${errorMessage}"></p>
    </div>

    <div class="mb-3">
        <a th:href="@{/provinces/new}" class="btn btn-success">+ Nueva Provincia</a>
    </div>

    <table class="table table-bordered mt-3">
        <thead>
        <tr>
            <th>ID</th>
            <th>Código</th>
            <th>Nombre</th>
            <th>Región</th>
            <th>Acciones</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="province : ${listProvinces}">
            <td th:text="${province.id}"></td>
            <td th:text="${province.code}"></td>
            <td th:text="${province.name}"></td>
            <td th:text="${province.regionName}">-</td>
            <td>
                <a th:href="@{/provinces/edit(id=${province.id})}" class="btn btn-primary btn-sm">Editar</a>
                <form th:action="@{/provinces/delete}" method="post" class="d-inline">
                    <input type="hidden" name="id" th:value="${province.id}">
                    <button type="submit" class="btn btn-danger btn-sm"
                            th:onclick="|return confirm('¿Seguro que deseas eliminar esta provincia?')|">Eliminar
                    </button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>

    <a href="#" th:href="@{/}" class="btn btn-secondary mt-3">Volver al inicio</a>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>

</body>
</html>
