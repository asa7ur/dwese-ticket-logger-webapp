<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head th:replace="~{fragments/head :: head('Ticket Logger - Listado de Comunidades Autónomas')}">
    <title>Ticket Logger</title>
</head>
<body>
<header th:replace="~{fragments/header :: header}"></header>

<main class="container mt-5">
    <h1 th:text="#{msg.region.title}"></h1>

    <div th:if="${errorMessage}" class="alert alert-danger">
        <p th:text="${errorMessage}"></p>
    </div>

    <div th:if="${successMessage}" class="alert alert-success">
        <p th:text="${successMessage}"></p>
    </div>

    <div class="mb-3">
        <a th:href="@{/regions/new}" class="btn btn-success mt-3">+ Nueva Comunidad Autónoma</a>
    </div>

    <table class="table table-bordered mt-3">
        <thead>
        <tr>
            <th>ID</th>
            <th>Código</th>
            <th>Nombre</th>
            <th>Imagen</th>
            <th>Acciones</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="region : ${listRegions}">
            <td th:text="${region.id}"></td>
            <td th:text="${region.code}"></td>
            <td th:text="${region.name}"></td>
            <td>
                <img th:if="${region.image != null}"
                     th:src="@{'/uploads/' + ${region.image}}"
                     alt="Imagen de la región"
                     style="width: 150px; height: 100px; object-fit: cover;"/>
                <span th:if="${region.image == null}"
                      th:text="'Sin imagen'"></span>
            </td>
            <td>
                <a th:href="@{/regions/edit(id=${region.id})}" class="btn btn-primary btn-sm">Editar</a>
                <form th:action="@{/regions/delete}" method="post" class="d-inline">
                    <input type="hidden" name="id" th:value="${region.id}"/>
                    <button type="submit" class="btn btn-danger btn-sm"
                            th:onclick="|return confirm('¿Seguro que deseas eliminar esta region?');|">Eliminar
                    </button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>

    <nav th:if="${totalPages > 1}" class="mt-4">
        <ul class="pagination justify-content-center">
            <li th:classappend="${currentPage == 1} ? 'disabled'">
                <a class="page-link" th:href="@{/regions(page=${currentPage - 1})}">Anterior</a>
            </li>

            <li th:each="pageNum : ${#numbers.sequence(1, totalPages)}"
                th:classappend="${pageNum == currentPage} ? 'active'">
                <a class="page-link" th:href="@{/regions(page=${pageNum})}" th:text="${pageNum}">1</a>
            </li>

            <li th:classappend="${currentPage == totalPages} ? 'disabled'">
                <a class="page-link" th:href="@{/regions(page=${currentPage + 1})}">Siguiente</a>
            </li>
        </ul>
    </nav>

    <a href="#" th:href="@{/}" class="btn btn-secondary mt-3">Volver al inicio</a>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>

</body>
</html>
