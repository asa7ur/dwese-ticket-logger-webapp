<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Ticket Logger - Listado de Comunidades Autónomas')}"></head>
<body>
<header th:replace="~{fragments/header :: header}"></header>

<main class="container mt-5">
    <h1>Lista de Comunidades Autónomas</h1>

    <div th:if="${errorMessage}" class="alert alert-danger">
        <p th:text="${errorMessage}"></p>
    </div>

    <div class="mb-3">
        <a th:href="@{/regions/new}" class="btn btn-success mt-3">+ Nueva Comunidad Autónoma</a>
    </div>

    <table class="table table-bordered mt-3">
        <thead>
        <tr>
            <th>ID</th>
            <th>Código</th>
            <th>Nombre</th>
            <th>Acciones</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="region : ${listRegions}">
            <td th:text="${region.id}"></td>
            <td th:text="${region.code}"></td>
            <td th:text="${region.name}"></td>
            <td>
                <a th:href="@{/regions/edit(id=${region.id})}" class="btn btn-primary btn-sm">Editar</a>
                <form th:action="@{/regions/delete}" method="post" class="d-inline">
                    <input type="hidden" name="id" th:value="${region.id}"/>
                    <button type="submit" class="btn btn-danger btn-sm"
                            th:onclick="|return confirm('¿Seguro que deseas eliminar esta region?');|">Eliminar
                    </button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>

    <a href="#" th:href="@{/}" class="btn btn-secondary mt-3">Volver al inicio</a>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>

</body>
</html>
